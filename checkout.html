<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Checkout</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Checkout</h1>
        <nav><ul><li><a href="landing.html">Home</a></li></ul></nav>
    </header>

    <main class="checkout-container"> <section class="shipping">
            <form>
                <fieldset>
                    <legend>Shipping Address</legend>
                    <label for="name">Name:</label>
                    <input type="text" id="name" required>
                    <label for="street">Street:</label>
                    <input type="text" id="street" required>
                </fieldset>
                
                <fieldset>
                    <legend>Payment</legend>
                    <label><input type="radio" name="pay" required> Credit Card</label>
                </fieldset>
                <button type="submit">Place Order</button>
            </form>
        </section>

        <aside class="order-summary">
            <h2>Order Summary</h2>
            <p>Total: $34.99</p>
        </aside>
    </main>

    <footer><p>&copy; 2026 M.R COLLECTION</p></footer>
</body>
</html>
